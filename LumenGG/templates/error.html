{% extends "base_v2.html" %}
{% block title %}오류 - LumenDB V2{% endblock title %}
{% block legacy_href %}{% url "card:index" %}{% endblock legacy_href %}
{% block content %}
<section class="v2-error-wrap">
    <div class="v2-error-code">ERROR</div>
    <div class="v2-panel v2-error-panel">
        <div class="v2-kicker">REQUEST STOPPED</div>
        <h1 class="v2-title">요청을 계속할 수 없습니다.</h1>
        <p class="v2-subtitle">{{ error|safe }}</p>
        <div class="v2-error-actions">
            <a class="v2-button v2-button-primary" href="{% url "card:indexV2" %}">메인으로 이동</a>
            <a class="v2-button" href="javascript:history.back()">이전 페이지</a>
        </div>
    </div>
</section>
{% endblock content %}
